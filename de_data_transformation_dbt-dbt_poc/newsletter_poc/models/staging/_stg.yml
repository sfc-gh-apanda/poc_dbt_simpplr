version: 2

models:
  - name: stg_newsletter
    description: >
      Parses VARIANT columns from VW_ENL_NEWSLETTER source.
      Extracts all newsletter fields, computes hash_value for change detection,
      and derives is_deleted flag from event type.
    columns:
      - name: staging_id
        description: "Source table row ID"
      - name: code
        description: "Newsletter unique identifier (UUID from domain_payload.id)"
        tests:
          - not_null
      - name: tenant_code
        description: "Tenant identifier extracted from header.tenant_info.accountId"
        tests:
          - not_null
      - name: hash_value
        description: "MD5 hash of all business columns for change detection"

  - name: stg_newsletter_recipient
    description: >
      LATERAL FLATTEN on recipients array from VW_ENL_NEWSLETTER.
      Aggregates recipient names via LISTAGG for denormalization into
      the newsletter fact table.
    columns:
      - name: recipient_name
        description: "Comma-separated list of recipient audience/group names"
      - name: recp_join_condition
        description: "Composite key for joining back to stg_newsletter"

  - name: stg_newsletter_interaction_summary
    description: >
      Ephemeral model — aggregates distinct delivery system types per newsletter
      by reading from stg_newsletter_interaction (no second source scan).
      Produces a LISTAGG of delivery channels (Email, SMS, Teams, etc.)
      for each newsletter. Inlined as a CTE into downstream models.
    columns:
      - name: actual_delivery_system_type
        description: "Comma-separated list of delivery channels used"
      - name: int_tenant_code
        description: "Tenant identifier"
      - name: int_newsletter_code
        description: "Newsletter code for joining"

  - name: stg_newsletter_interaction
    description: >
      Parses VARIANT columns from VW_ENL_NEWSLETTER_INTERACTION source.
      Extracts interaction event details, classifies device type from user_agent,
      and computes hash_value for change detection.
    columns:
      - name: staging_id
        description: "Source table row ID"
      - name: code
        description: "Interaction event unique identifier"
        tests:
          - not_null
      - name: tenant_code
        description: "Tenant identifier"
        tests:
          - not_null
      - name: device_type_code
        description: >
          Device classification derived from user_agent string:
          DT001=Native Mobile, DT002=Mobile App, DT003=Mobile Browser,
          DT004=Desktop App, DT005=Desktop Browser, DT000=Unknown
      - name: hash_value
        description: "MD5 hash of all business columns for change detection"

  - name: stg_newsletter_category
    description: >
      Parses VARIANT columns from VW_ENL_NEWSLETTER_CATEGORY source.
      Extracts category code, name, created_at, and computes hash_value.
    columns:
      - name: staging_id
        description: "Source table row ID"
      - name: code
        description: "Category unique identifier"
        tests:
          - not_null
      - name: tenant_code
        description: "Tenant identifier"
        tests:
          - not_null
      - name: hash_value
        description: "MD5 hash of all business columns for change detection"
