version: 2

models:
  # ═══════════════════════════════════════════════════════════════════════
  # wrk_newsletter — Newsletter delta work table (→ NEWSLETTER_HIST → UDL.NEWSLETTER)
  # ═══════════════════════════════════════════════════════════════════════
  - name: wrk_newsletter
    description: >
      Newsletter delta work table — contains only the current run's new/changed records.
      Hash-deduped against UDL.NEWSLETTER (published current state). Enriched with
      reference lookups. Published to NEWSLETTER_HIST (master SCD-2 accumulator) then
      derived to UDL.NEWSLETTER via TRUNCATE+INSERT (preserves Time Travel).
    config:
      contract:
        enforced: true
    columns:
      - name: id
        data_type: NUMBER(38,0)
        constraints:
          - type: not_null
        tests:
          - not_null
          - unique
      - name: data_source_code
        data_type: VARCHAR(16)
        tests:
          - accepted_values:
              values: ['DS001', 'DS002']
              config:
                where: "data_source_code IS NOT NULL"
      - name: tenant_code
        data_type: VARCHAR(255)
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: staging_id
        data_type: NUMBER(38,0)
      - name: code
        data_type: VARCHAR(255)
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: name
        data_type: VARCHAR(16777216)
      - name: subject
        data_type: VARCHAR(16777216)
      - name: sender_address
        data_type: VARCHAR(16777216)
      - name: send_as_email
        data_type: BOOLEAN
      - name: send_as_sms
        data_type: BOOLEAN
      - name: send_as_ms_teams_message
        data_type: BOOLEAN
      - name: send_as_slack_message
        data_type: BOOLEAN
      - name: send_as_intranet
        data_type: BOOLEAN
      - name: scheduled_at
        data_type: TIMESTAMP_NTZ
      - name: sent_at
        data_type: TIMESTAMP_NTZ
      - name: newsletter_created_by_code
        data_type: VARCHAR(255)
      - name: newsletter_updated_by_code
        data_type: VARCHAR(255)
      - name: newsletter_created_datetime
        data_type: TIMESTAMP_NTZ
      - name: newsletter_updated_datetime
        data_type: TIMESTAMP_NTZ
      - name: status_code
        data_type: VARCHAR(255)
        tests:
          - not_null
      - name: category_code
        data_type: VARCHAR(255)
      - name: template_code
        data_type: VARCHAR(255)
      - name: theme_code
        data_type: VARCHAR(255)
      - name: is_archived
        data_type: BOOLEAN
      - name: send_as_timezone_aware_schedule
        data_type: BOOLEAN
      - name: reply_to_email_address
        data_type: VARCHAR(16777216)
      - name: recipient_info
        data_type: VARIANT
      - name: recipient_type_code
        data_type: VARCHAR(255)
        tests:
          - not_null
      - name: is_deleted
        data_type: BOOLEAN
      - name: deleted_note
        data_type: VARCHAR(16777216)
      - name: deleted_datetime
        data_type: TIMESTAMP_NTZ
      - name: active_flag
        data_type: BOOLEAN
        constraints:
          - type: not_null
      - name: active_date
        data_type: TIMESTAMP_NTZ
      - name: inactive_date
        data_type: TIMESTAMP_NTZ
      - name: created_by
        data_type: VARCHAR(255)
      - name: created_datetime
        data_type: TIMESTAMP_NTZ
      - name: updated_by
        data_type: VARCHAR(255)
      - name: updated_datetime
        data_type: TIMESTAMP_NTZ
      - name: hash_value
        data_type: VARCHAR(32)
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: recipient_name
        data_type: VARCHAR(16777216)
      - name: actual_delivery_system_type
        data_type: VARCHAR(16777216)
      - name: batch_run_id
        data_type: NUMBER(38,0)
      - name: dbt_loaded_at
        data_type: TIMESTAMP_NTZ
        constraints:
          - type: not_null
      - name: dbt_run_id
        data_type: VARCHAR(50)
      - name: dbt_batch_id
        data_type: VARCHAR(32)
      - name: dbt_source_model
        data_type: VARCHAR(100)
      - name: dbt_environment
        data_type: VARCHAR(20)
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - tenant_code
            - code

  # ═══════════════════════════════════════════════════════════════════════
  # wrk_newsletter_interaction — Interaction delta work table (→ UDL.NEWSLETTER_INTERACTION)
  # ═══════════════════════════════════════════════════════════════════════
  - name: wrk_newsletter_interaction
    description: >
      Newsletter interaction delta work table. Contains only the current run's
      new/changed records. Hash-deduped against UDL.NEWSLETTER_INTERACTION.
      Enriched with 5 reference lookups. Published via MERGE to UDL.NEWSLETTER_INTERACTION.
    config:
      contract:
        enforced: true
    columns:
      - name: id
        data_type: NUMBER(38,0)
        constraints:
          - type: not_null
        tests:
          - not_null
          - unique
      - name: data_source_code
        data_type: VARCHAR(16)
        tests:
          - accepted_values:
              values: ['DS001', 'DS002']
              config:
                where: "data_source_code IS NOT NULL"
      - name: tenant_code
        data_type: VARCHAR(255)
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: staging_id
        data_type: NUMBER(38,0)
      - name: code
        data_type: VARCHAR(255)
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: newsletter_code
        data_type: VARCHAR(255)
      - name: recipient_code
        data_type: VARCHAR(16777216)
      - name: interaction_type_code
        data_type: VARCHAR(255)
        tests:
          - not_null
      - name: delivery_system_type_code
        data_type: VARCHAR(255)
        tests:
          - not_null
      - name: device_type_code
        data_type: VARCHAR(16)
        tests:
          - accepted_values:
              values: ['DT000', 'DT001', 'DT002', 'DT003', 'DT004', 'DT005']
      - name: total_time_spent_on_intranet_hub
        data_type: NUMBER(38,0)
      - name: recipient_current_city
        data_type: VARCHAR(16777216)
      - name: recipient_current_country
        data_type: VARCHAR(16777216)
      - name: recipient_current_department
        data_type: VARCHAR(16777216)
      - name: recipient_current_location
        data_type: VARCHAR(16777216)
      - name: recipient_current_email
        data_type: VARCHAR(16777216)
      - name: interaction_datetime
        data_type: TIMESTAMP_NTZ
      - name: recipient_type_code
        data_type: VARCHAR(255)
      - name: block_code
        data_type: VARCHAR(255)
      - name: block_type_code
        data_type: VARCHAR(255)
      - name: click_type_code
        data_type: VARCHAR(255)
      - name: ip_address
        data_type: VARCHAR(255)
      - name: link_clicked_page_title
        data_type: VARCHAR(16777216)
      - name: link_clicked_url
        data_type: VARCHAR(16777216)
      - name: session_id
        data_type: VARCHAR(255)
      - name: recipient_current_timezone
        data_type: VARCHAR(255)
      - name: user_agent
        data_type: VARCHAR(16777216)
      - name: active_flag
        data_type: BOOLEAN
        constraints:
          - type: not_null
      - name: active_date
        data_type: TIMESTAMP_NTZ
      - name: created_by
        data_type: VARCHAR(255)
      - name: created_datetime
        data_type: TIMESTAMP_NTZ
      - name: updated_by
        data_type: VARCHAR(255)
      - name: updated_datetime
        data_type: TIMESTAMP_NTZ
      - name: hash_value
        data_type: VARCHAR(32)
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: batch_run_id
        data_type: NUMBER(38,0)
      - name: dbt_loaded_at
        data_type: TIMESTAMP_NTZ
        constraints:
          - type: not_null
      - name: dbt_run_id
        data_type: VARCHAR(50)
      - name: dbt_batch_id
        data_type: VARCHAR(32)
      - name: dbt_source_model
        data_type: VARCHAR(100)
      - name: dbt_environment
        data_type: VARCHAR(20)
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - tenant_code
            - code

  # ═══════════════════════════════════════════════════════════════════════
  # wrk_newsletter_category — Category delta work table (→ UDL.NEWSLETTER_CATEGORY)
  # ═══════════════════════════════════════════════════════════════════════
  - name: wrk_newsletter_category
    description: >
      Newsletter category delta work table. Contains only the current run's
      new/changed records. Hash-deduped against UDL.NEWSLETTER_CATEGORY.
      Simple entity with code, name, and creation timestamp.
      Published via MERGE to UDL.NEWSLETTER_CATEGORY.
    config:
      contract:
        enforced: true
    columns:
      - name: id
        data_type: NUMBER(38,0)
        constraints:
          - type: not_null
        tests:
          - not_null
          - unique
      - name: data_source_code
        data_type: VARCHAR(16)
        tests:
          - accepted_values:
              values: ['DS001', 'DS002']
              config:
                where: "data_source_code IS NOT NULL"
      - name: tenant_code
        data_type: VARCHAR(255)
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: staging_id
        data_type: NUMBER(38,0)
      - name: code
        data_type: VARCHAR(255)
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: name
        data_type: VARCHAR(16777216)
      - name: category_created_datetime
        data_type: TIMESTAMP_NTZ
      - name: active_flag
        data_type: BOOLEAN
        constraints:
          - type: not_null
      - name: active_date
        data_type: TIMESTAMP_NTZ
      - name: inactive_date
        data_type: TIMESTAMP_NTZ
      - name: created_by
        data_type: VARCHAR(255)
      - name: created_datetime
        data_type: TIMESTAMP_NTZ
      - name: updated_by
        data_type: VARCHAR(255)
      - name: updated_datetime
        data_type: TIMESTAMP_NTZ
      - name: hash_value
        data_type: VARCHAR(32)
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: batch_run_id
        data_type: NUMBER(38,0)
      - name: dbt_loaded_at
        data_type: TIMESTAMP_NTZ
        constraints:
          - type: not_null
      - name: dbt_run_id
        data_type: VARCHAR(50)
      - name: dbt_batch_id
        data_type: VARCHAR(32)
      - name: dbt_source_model
        data_type: VARCHAR(100)
      - name: dbt_environment
        data_type: VARCHAR(20)
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - tenant_code
            - code

  # ═══════════════════════════════════════════════════════════════════════
  # pipeline_complete — Sentinel model for atomic publish + archive
  # ═══════════════════════════════════════════════════════════════════════
  - name: pipeline_complete
    description: >
      Sentinel model that depends on all 3 work models via ref(). Only runs
      after all wrk_* models complete successfully. Post-hooks perform:
      1. Publish: wrk delta → NEWSLETTER_HIST (SCD-2), MERGE interaction/category, TRUNCATE+INSERT UDL.NEWSLETTER
      2. Archive processed raw records from ENL_* → ENL_*_ARCHIVE (if enabled)
    columns:
      - name: model
        description: "Name of the upstream mart model"
      - name: row_count
        description: "Row count of the upstream mart model"
