        active_flag: BOOLEAN
        active_date: DATE
        identifier_shared_service: VARCHAR(255)

  - name: ref_newsletter_click_type
    description: "Newsletter click type reference lookup"
    config:
      column_types:
        id: NUMBER(38,0)
        code: VARCHAR(255)
        active_flag: BOOLEAN
        active_date: DATE
        identifier_shared_service: VARCHAR(255)

  - name: ref_newsletter_block_type
    description: "Newsletter block type reference lookup"
    config:
