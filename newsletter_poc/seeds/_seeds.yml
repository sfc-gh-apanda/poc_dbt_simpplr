version: 2

seeds:
  - name: ref_newsletter_status
    description: "Newsletter status reference lookup"
    config:
      column_types:
        id: NUMBER(38,0)
        code: VARCHAR(255)
        active_flag: BOOLEAN
        active_date: DATE
        identifier_shared_service: VARCHAR(255)

  - name: ref_newsletter_recipient_type
    description: "Newsletter recipient type reference lookup with include_followers flag"
    config:
      column_types:
        id: NUMBER(38,0)
        code: VARCHAR(255)
        active_flag: BOOLEAN
        active_date: DATE
        include_followers: BOOLEAN
        identifier_shared_service: VARCHAR(255)

  - name: ref_newsletter_interaction_type
    description: "Newsletter interaction type reference lookup"
    config:
      column_types:
