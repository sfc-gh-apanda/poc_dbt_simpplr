version: 2

sources:
  - name: shared_services_staging
    description: "Simpplr shared services staging views — Kafka message reconstructions"
    database: SIMPPLR_DBT_DEV
    schema: SIMPPLR_DBT_SOURCES
    tags: ['newsletter', 'source']
    tables:
      - name: vw_enl_newsletter
        description: >
          Reconstructed Kafka messages for newsletter events.
          Each row is a header+payload pair with DOMAIN_PAYLOAD (VARIANT)
          containing the full newsletter JSON and HEADER containing tenant info.
        columns:
          - name: ID
            description: "Staging row identifier"
            tests:
              - not_null
              - unique
          - name: HEADER_ID
            description: "Header row identifier (from header file)"
          - name: DOMAIN_PAYLOAD
            description: "Full newsletter event payload (VARIANT)"
            tests:
              - not_null
          - name: TYPE
            description: "Event type (NEWSLETTER_CREATED, NEWSLETTER_MODIFIED, NEWSLETTER_DELETED)"
            tests:
              - accepted_values:
                  values: ['NEWSLETTER_CREATED', 'NEWSLETTER_MODIFIED', 'NEWSLETTER_DELETED']
          - name: KAFKA_TIMESTAMP
            description: "Kafka ingestion timestamp"
            tests:
              - not_null
          - name: HEADER
            description: "Kafka header with tenant_info (VARIANT)"
            tests:
              - not_null
          - name: CREATED_DATETIME
            description: "Row insertion timestamp — used for incremental watermark"
            tests:
              - not_null

      - name: vw_enl_newsletter_interaction
        description: >
          Reconstructed Kafka messages for newsletter interaction events.
          Tracks user-level engagement (opens, clicks, sends) across delivery channels.
        columns:
          - name: ID
            description: "Staging row identifier"
            tests:
              - not_null
              - unique
          - name: DOMAIN_PAYLOAD
            description: "Full interaction event payload (VARIANT)"
            tests:
              - not_null
          - name: KAFKA_TIMESTAMP
            description: "Kafka ingestion timestamp"
            tests:
              - not_null
          - name: HEADER
            description: "Kafka header with tenant_info (VARIANT)"
            tests:
              - not_null
          - name: CREATED_DATETIME
            description: "Row insertion timestamp — used for incremental watermark"
            tests:
              - not_null

      - name: vw_enl_newsletter_category
        description: >
          Reconstructed Kafka messages for newsletter category events.
          Simple entity with code, name, and creation timestamp.
        columns:
          - name: ID
            description: "Staging row identifier"
            tests:
              - not_null
              - unique
          - name: DOMAIN_PAYLOAD
            description: "Full category event payload (VARIANT)"
            tests:
              - not_null
          - name: KAFKA_TIMESTAMP
            description: "Kafka ingestion timestamp"
            tests:
              - not_null
          - name: HEADER
            description: "Kafka header with tenant_info (VARIANT)"
            tests:
              - not_null
          - name: CREATED_DATETIME
            description: "Row insertion timestamp — used for incremental watermark"
            tests:
              - not_null
